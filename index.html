<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🧱 Roblox 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;user-select:none}
body{overflow:hidden;background:#0a0a12;font-family:system-ui,sans-serif;color:#fff}
#reg{position:fixed;inset:0;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:100}
.reg-box{background:#111;padding:20px;border-radius:12px;text-align:center;width:90%;max-width:300px;border:1px solid #333}
.reg-input{width:100%;padding:10px;background:#222;border:1px solid #444;color:#fff;border-radius:6px;margin:10px 0}
.btn{width:100%;padding:10px;background:#00e5ff;color:#000;border:none;border-radius:6px;font-weight:bold;cursor:pointer;margin-top:5px}
.btn:disabled{opacity:0.5;cursor:not-allowed}
#menu{position:fixed;inset:0;background:#fff;display:none;flex-direction:column;overflow-y:auto;color:#000}
.menu-head{padding:15px;text-align:center;border-bottom:1px solid #eee}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;padding:15px}
.card{background:#f8f9fa;border:1px solid #ddd;border-radius:10px;padding:12px;text-align:center;cursor:pointer;transition:0.2s}
.card:hover{transform:translateY(-3px);box-shadow:0 5px 15px rgba(0,0,0,0.1)}
#game{position:fixed;inset:0;display:none;background:#111}
#hud{position:fixed;top:0;left:0;width:100%;padding:10px;display:flex;justify-content:space-between;z-index:20;pointer-events:none}
#hud button{pointer-events:auto;background:#f44;color:#fff;border:none;padding:5px 10px;border-radius:4px;cursor:pointer}
#chat{position:fixed;top:50px;left:10px;width:220px;max-height:120px;overflow-y:auto;background:rgba(0,0,0,0.6);border-radius:8px;padding:6px;font-size:12px;z-index:20;pointer-events:auto}
#chat input{width:100%;padding:4px;background:#000;border:1px solid #444;color:#fff;border-radius:4px;margin-top:4px}
#joy{position:fixed;bottom:30px;left:30px;width:100px;height:100px;background:rgba(255,255,255,0.15);border-radius:50%;border:2px solid rgba(255,255,255,0.3);display:none}
#joy-k{position:absolute;top:50%;left:50%;width:40px;height:40px;background:#00e5ff;border-radius:50%;transform:translate(-50%,-50%)}
#jump{position:fixed;bottom:40px;right:40px;width:60px;height:60px;background:rgba(0,229,255,0.3);border:2px solid #00e5ff;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:20px;pointer-events:auto}
#shooter-hud{display:none;position:fixed;inset:0;pointer-events:none;z-index:15}
#cross{position:fixed;top:50%;left:50%;width:16px;height:16px;border:2px solid #fff;border-radius:50%;transform:translate(-50%,-50%)}
#hp{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:160px;height:12px;background:#333;border-radius:6px;overflow:hidden}
#hp-f{width:100%;height:100%;background:linear-gradient(90deg,#f44,#4f4);transition:width 0.2s}
#score{position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.6);padding:6px 10px;border-radius:6px;font-weight:bold;font-size:14px}
#loading{position:fixed;inset:0;background:#0a0a12;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:50}
.loader{width:40px;height:40px;border:4px solid #333;border-top-color:#00e5ff;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:15px}
@keyframes spin{to{transform:rotate(360deg)}}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>

<!-- РЕГИСТРАЦИЯ -->
<div id="reg">
  <div class="reg-box">
    <h2>👋 Привет!</h2>
    <p style="color:#888;font-size:13px;margin:8px 0">Придумай ник (2-16 символов)</p>
    <input type="text" id="nick" class="reg-input" placeholder="Никнейм" maxlength="16">
    <div id="err" style="color:#f66;font-size:12px;min-height:16px"></div>
    <button id="reg-btn" class="btn" disabled>Играть</button>
  </div>
</div>

<!-- ЗАГРУЗКА -->
<div id="loading">
  <div class="loader"></div>
  <div id="load-text" style="color:#00e5ff">Подключение...</div>
</div>

<!-- МЕНЮ -->
<div id="menu">
  <div class="menu-head">
    <h1>🧱 ROBLOX 3D</h1>
    <p style="color:#666;font-size:13px" id="uname">Гость</p>
  </div>
  <div class="grid">
    <div class="card" data-g="brookhaven"><h3>🏡 RP</h3><p style="font-size:12px;color:#666">Свободный мир</p></div>
    <div class="card" data-g="shooter"><h3> Шутер</h3><p style="font-size:12px;color:#666">Командный бой</p></div>
    <div class="card" data-g="brainrot"><h3>🧠 Brainrot</h3><p style="font-size:12px;color:#666">Укради артефакт</p></div>
    <div class="card" data-g="cheese"><h3> Сыр</h3><p style="font-size:12px;color:#666">Лабиринт + крыса</p></div>
  </div>
</div>

<!-- ИГРА -->
<div id="game">
  <canvas id="c"></canvas>
  <div id="hud">
    <button onclick="back()">🏠 Меню</button>
    <div id="score" style="display:none">🔴 0 : 0 🔵</div>
  </div>
  <div id="chat"><div id="msg"></div><input id="ci" placeholder="Чат..."></div>
  <div id="joy"><div id="joy-k"></div></div>
  <div id="jump">⬆️</div>
  <div id="shooter-hud"><div id="cross"></div><div id="hp"><div id="hp-f"></div></div></div>
</div>

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ===== КОНФИГ =====
const isMob = /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent) || window.innerWidth < 768;
const S = { ws:null, id:null, name:'', game:null, scene:null, cam:null, ren:null, p:null, others:new Map(), gun:null, joy:{x:0,y:0,active:false}, keys:{}, shoot:false, audioCtx:null };

// ===== DOM =====
const $ = id => document.getElementById(id);
const reg=$('reg'), menu=$('menu'), game=$('game'), nick=$('nick'), regBtn=$('reg-btn'), err=$('err'), uname=$('uname');
const chatBox=$('msg'), chatIn=$('ci'), joy=$('joy'), joyK=$('joy-k'), jump=$('jump'), sHud=$('shooter-hud'), scoreEl=$('score'), hpF=$('hp-f'), loadEl=$('loading'), loadTxt=$('load-text');

// ===== РЕГИСТРАЦИЯ + СОХРАНЕНИЕ =====
const saved = localStorage.getItem('r3d_nick');
if (saved) { nick.value = saved; checkNick(); }
nick.addEventListener('input', checkNick);
regBtn.onclick = () => {
  S.name = nick.value.trim();
  localStorage.setItem('r3d_nick', S.name);
  reg.style.display = 'none';
  menu.style.display = 'flex';
  uname.textContent = S.name;
  connect();
};
function checkNick() {
  const v = nick.value.trim();
  const ok = /^[a-zA-Z0-9_а-яА-ЯёЁ]{2,16}$/.test(v);
  err.textContent = ok ? '' : 'Только буквы, цифры и _ (2-16)';
  regBtn.disabled = !ok;
}

// ===== КНОПКИ МЕНЮ =====
document.querySelectorAll('.card').forEach(c => {
  c.onclick = () => startGame(c.dataset.g);
});

window.back = () => {
  game.style.display = 'none';
  menu.style.display = 'flex';
  sHud.style.display = 'none';
  if (S.ren) { S.ren.dispose(); S.ren=null; }
  if (S.gun) { S.scene.remove(S.gun); S.gun=null; }
  S.scene=null; S.others.clear();
};

// ===== ЗАГРУЗКА РЕСУРСОВ (ПЛОСКАЯ СТРУКТУРА) =====
async function loadAssets() {
  loadEl.style.display = 'flex';
  loadTxt.textContent = 'Загрузка текстур...';
  
  const texLoader = new THREE.TextureLoader();
  S.floorTex = await new Promise(r => texLoader.load('floor.png', r, undefined, () => r(null)));
  S.wallTex = await new Promise(r => texLoader.load('wall.png', r, undefined, () => r(null)));
  
  loadTxt.textContent = 'Загрузка модели оружия...';
  S.gunModel = await new Promise(r => {
    new GLTFLoader().load('pistol.glb', g => r(g.scene), undefined, () => {
      // Фолбэк: простой пистолет из кубов
      const g = new THREE.Group();
      g.add(new THREE.Mesh(new THREE.BoxGeometry(0.15,0.15,0.4), new THREE.MeshStandardMaterial({color:0x333})));
      g.add(new THREE.Mesh(new THREE.BoxGeometry(0.1,0.2,0.1), new THREE.MeshStandardMaterial({color:0x555})).translateY(-0.15));
      r(g);
    });
  });

  loadTxt.textContent = 'Инициализация звуков...';
  S.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  S.sndShoot = new Audio('shoot.mp3'); S.sndShoot.volume = 0.3;
  S.sndReload = new Audio('reload.mp3'); S.sndReload.volume = 0.3;
  S.sndHit = new Audio('hit.mp3'); S.sndHit.volume = 0.3;
  
  // Фолбэк звуки если файлов нет
  const playFallback = (type) => {
    const o = S.audioCtx.createOscillator(), g = S.audioCtx.createGain();
    o.connect(g); g.connect(S.audioCtx.destination);
    if(type==='shoot'){o.frequency.value=800;g.gain.value=0.1;o.start();o.stop(S.audioCtx.currentTime+0.1);}
    else if(type==='hit'){o.frequency.value=200;g.gain.value=0.15;o.start();o.stop(S.audioCtx.currentTime+0.15);}
  };
  S.playSound = (type) => {
    const snd = type==='shoot'?S.sndShoot:type==='reload'?S.sndReload:S.sndHit;
    if(snd && snd.src) { const c=snd.cloneNode(); c.play().catch(()=>playFallback(type)); }
    else playFallback(type);
  };

  loadEl.style.display = 'none';
}

// ===== СЕТЬ =====
function connect() {
  const proto = location.protocol==='https:'?'wss:':'ws:';
  S.ws = new WebSocket(`${proto}//${location.host}`);
  S.ws.onopen = () => S.ws.send(JSON.stringify({type:'register', name:S.name}));
  S.ws.onmessage = e => {
    try {
      const d = JSON.parse(e.data);
      if(d.type==='registered') S.id = d.id;
      if(d.type==='gameReady') {
        S.p = {x:0,y:1,z:0,yaw:0,health:100,team:d.team};
        if(d.gameId==='shooter') { sHud.style.display='block'; scoreEl.style.display='block'; }
      }
      if(d.type==='snapshot') {
        S.p.health = d.health;
        if(S.game==='shooter') {
          hpF.style.width = `${d.health}%`;
          scoreEl.textContent = `🔴 ${d.scores?.red||0} : ${d.scores?.blue||0} 🔵`;
        }
        d.players.forEach(o => {
          if(!S.others.has(o.id)) spawnOther(o);
          else { const m=S.others.get(o.id); m.position.set(o.x,o.y,o.z); m.rotation.y=-o.yaw; }
        });
      }
      if(d.type==='chat') addChat(d.name, d.msg);
      if(d.type==='shoot') S.playSound('shoot');
      if(d.type==='kill') addChat('sys', `💀 ${d.killer} убил ${d.victim}`);
    } catch(e){}
  };
}

// ===== 3D ИНИЦИАЛИЗАЦИЯ =====
async function init3D(g) {
  await loadAssets();
  const cv = $('c'); cv.width=innerWidth; cv.height=innerHeight;
  S.scene = new THREE.Scene();
  S.scene.background = new THREE.Color(g==='shooter'?0x222233:0x87CEEB);
  S.cam = new THREE.PerspectiveCamera(70, cv.width/cv.height, 0.1, 100);
  S.ren = new THREE.WebGLRenderer({canvas:cv, antialias:true});
  S.ren.setSize(cv.width, cv.height);
  S.ren.setPixelRatio(Math.min(devicePixelRatio, 2));
  
  S.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const sun = new THREE.DirectionalLight(0xffffff, 0.8);
  sun.position.set(10,20,10); S.scene.add(sun);
  
  // Пол
  let floorMat = new THREE.MeshStandardMaterial({color: g==='shooter'?0x444455:0x33aa33});
  if(S.floorTex) { S.floorTex.wrapS=S.floorTex.wrapT=THREE.RepeatWrapping; S.floorTex.repeat.set(8,8); floorMat.map=S.floorTex; floorMat.color.set(0xffffff); }
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(60,60), floorMat);
  floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; S.scene.add(floor);
  
  // Стены (для шутера)
  if(g==='shooter' && S.wallTex) {
    S.wallTex.wrapS=S.wallTex.wrapT=THREE.RepeatWrapping; S.wallTex.repeat.set(2,1);
    const wMat = new THREE.MeshStandardMaterial({map:S.wallTex});
    [[-28,0,2,10],[28,0,2,10],[0,-28,58,2],[0,28,58,2]].forEach(([x,z,w,d])=>{
      const m=new THREE.Mesh(new THREE.BoxGeometry(w,6,d),wMat);
      m.position.set(x,3,z); S.scene.add(m);
    });
  }
  
  // Игрок + Оружие
  S.p = {x:0,y:1,z:0,yaw:0,health:100};
  const body = new THREE.Mesh(new THREE.BoxGeometry(1,2,1), new THREE.MeshStandardMaterial({color:0xff3333}));
  body.position.y=1; S.scene.add(body); S.p.mesh = body;
  
  S.gun = S.gunModel.clone();
  S.gun.position.set(0.4, -0.3, -0.6);
  S.gun.rotation.y = Math.PI;
  S.cam.add(S.gun);
  S.scene.add(S.cam);
  
  setupInput(g);
  loop();
}

function spawnOther(o) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(1,2,1), new THREE.MeshStandardMaterial({color:o.team==='red'?0xff2a2a:0x2a8aff}));
  m.position.set(o.x,o.y,o.z); m.rotation.y=-o.yaw;
  S.scene.add(m); S.others.set(o.id, m);
}

// ===== ВВОД =====
function setupInput(g) {
  if(!isMob) {
    document.addEventListener('keydown', e => {
      if(e.code==='KeyW') S.keys.f=-1; if(e.code==='KeyS') S.keys.f=1;
      if(e.code==='KeyA') S.keys.r=-1; if(e.code==='KeyD') S.keys.r=1;
      if(e.code==='Space') S.keys.jump=true;
      if(e.code==='KeyE') S.shoot=true;
      if(e.code==='KeyR') { S.playSound('reload'); S.shoot=false; }
    });
    document.addEventListener('keyup', e => {
      if(['KeyW','KeyS'].includes(e.code)) S.keys.f=0;
      if(['KeyA','KeyD'].includes(e.code)) S.keys.r=0;
      if(e.code==='Space') S.keys.jump=false;
      if(e.code==='KeyE') S.shoot=false;
    });
    document.addEventListener('mousemove', e => {
      if(document.pointerLockElement) S.p.yaw -= e.movementX*0.002;
    });
    document.addEventListener('click', () => {
      if(!document.pointerLockElement && S.ren?.domElement) S.ren.domElement.requestPointerLock();
      if(g==='shooter' && document.pointerLockElement) S.shoot=true;
    });
  } else {
    let sx,sy;
    joy.addEventListener('touchstart', e=>{e.preventDefault();const t=e.changedTouches[0];sx=t.clientX;sy=t.clientY;S.joy.active=true;},{passive:false});
    joy.addEventListener('touchmove', e=>{e.preventDefault();const t=e.changedTouches[0];let dx=t.clientX-sx,dy=t.clientY-sy;const d=Math.min(35,Math.hypot(dx,dy)),a=Math.atan2(dy,dx);joyK.style.transform=`translate(calc(-50% + ${Math.cos(a)*d}px), calc(-50% + ${Math.sin(a)*d}px))`;S.joy.x=Math.cos(a)*(d/35);S.joy.y=Math.sin(a)*(d/35);},{passive:false});
    joy.addEventListener('touchend', e=>{e.preventDefault();S.joy.active=false;S.joy.x=0;S.joy.y=0;joyK.style.transform='translate(-50%,-50%)';});
    jump.addEventListener('touchstart', e=>{e.preventDefault();S.keys.jump=true;},{passive:false});
    jump.addEventListener('touchend', ()=>S.keys.jump=false);
  }
  
  chatIn.addEventListener('keypress', e=>{
    if(e.key==='Enter' && e.target.value.trim() && S.ws?.readyState===1) {
      S.ws.send(JSON.stringify({type:'chat',msg:e.target.value.trim()}));
      e.target.value='';
    }
  });
}

// ===== ЦИКЛ =====
let lt=0;
function loop(t) {
  if(!S.ws || S.ws.readyState!==1 || !S.p) { requestAnimationFrame(loop); return; }
  const dt = Math.min((t-lt)/1000, 0.1); lt=t;
  
  const f = isMob ? S.joy.y : S.keys.f;
  const r = isMob ? S.joy.x : S.keys.r;
  S.p.x += (f * Math.sin(S.p.yaw+Math.PI) + r * Math.cos(S.p.yaw)) * 0.18;
  S.p.z += (f * Math.cos(S.p.yaw+Math.PI) - r * Math.sin(S.p.yaw)) * 0.18;
  if(S.keys.jump && S.p.y<=1.1) S.p.y=3;
  if(S.p.y>1) S.p.y-=0.22;
  S.p.mesh.position.set(S.p.x, S.p.y, S.p.z);
  S.p.mesh.rotation.y = S.p.yaw + Math.PI;
  
  if(S.shoot && S.game==='shooter') {
    S.ws.send(JSON.stringify({type:'action'}));
    S.playSound('shoot');
    S.shoot = false;
  }
  
  S.ws.send(JSON.stringify({type:'input', f:isMob?S.joy.y:S.keys.f, r:isMob?S.joy.x:S.keys.r, jump:S.keys.jump, yaw:S.p.yaw}));
  S.keys.jump=false;
  
  const cd = isMob?4:6, ch = isMob?2.5:4;
  S.cam.position.set(S.p.x+Math.sin(S.p.yaw)*cd, S.p.y+ch, S.p.z+Math.cos(S.p.yaw)*cd);
  S.cam.lookAt(S.p.x, S.p.y+1.5, S.p.z);
  
  // Анимация оружия
  if(S.gun) {
    S.gun.position.y = -0.3 + Math.sin(t*0.005)*0.01;
    S.gun.rotation.x = S.shoot ? -0.2 : 0;
  }
  
  S.ren.render(S.scene, S.cam);
  requestAnimationFrame(loop);
}

function addChat(n,m) {
  const d=document.createElement('div'); d.className='msg';
  d.innerHTML = n==='sys' ? m : `<b style="color:#8b5cf6">${n}:</b> ${m}`;
  chatBox.appendChild(d); chatBox.scrollTop=chatBox.scrollHeight;
}

window.addEventListener('resize', ()=>{
  if(S.cam && S.ren) {
    const cv=$('c'); cv.width=innerWidth; cv.height=innerHeight;
    S.cam.aspect=innerWidth/innerHeight; S.cam.updateProjectionMatrix();
    S.ren.setSize(innerWidth, innerHeight);
  }
});
</script>
</body>
</html>
