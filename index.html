<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🧱 Roblox 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;outline:none;touch-action:none}
body{overflow:hidden;background:#05050a;font-family:system-ui,sans-serif;color:#fff}
#load{position:fixed;inset:0;background:#05050a;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s}
#load.hidden{opacity:0;pointer-events:none}
.spin{width:40px;height:40px;border:3px solid #222;border-top-color:#00e5ff;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#load p{margin-top:12px;color:#888;font-size:13px}
#menu{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;padding:20px;background:radial-gradient(circle at 50% 30%,#0f172a,#000);overflow-y:auto;z-index:100}
#menu.on{display:flex}
h1{font-size:clamp(28px,5vw,38px);background:linear-gradient(90deg,#fff,#00e5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;max-width:850px;width:100%;margin-top:20px}
.card{background:rgba(20,20,30,0.8);border:1px solid #333;border-radius:10px;padding:14px;cursor:pointer;transition:.2s}
.card:hover{border-color:#00e5ff;transform:translateY(-3px)}
.card h3{font-size:16px;margin-bottom:4px}
.card p{font-size:11px;color:#aaa;margin-bottom:8px}
.btn{width:100%;padding:8px;background:#00e5ff;color:#000;border:none;border-radius:6px;font-weight:bold;cursor:pointer}
#game{display:none;position:fixed;inset:0}
#game.on{display:block}
#hud{position:fixed;top:0;left:0;width:100%;height:36px;background:linear-gradient(180deg,rgba(0,0,0,.7),transparent);display:flex;align-items:center;justify-content:space-between;padding:0 10px;z-index:50;font-size:12px}
#chat{position:fixed;top:10px;left:10px;width:240px;z-index:40;pointer-events:none}
#box{max-height:140px;overflow-y:auto;padding:6px;background:rgba(0,0,0,.5);border-radius:6px 6px 0 0;border:1px solid #333;border-bottom:none;font-size:11px;pointer-events:auto}
#inp{width:100%;padding:5px 8px;background:rgba(0,0,0,.7);border:1px solid #333;border-radius:0 0 6px 6px;color:#fff;font-size:11px;pointer-events:auto}
.msg{margin:2px 0;line-height:1.2}
.msg .n{color:#a78bfa;font-weight:bold}
.sys{color:#34d399;font-style:italic}
#exit{position:fixed;top:6px;right:10px;background:#ef4444;color:#fff;border:none;padding:4px 8px;border-radius:4px;cursor:pointer;z-index:60;font-size:11px}
#tags{position:fixed;inset:0;pointer-events:none;z-index:30}
.tag{position:absolute;transform:translate(-50%,-100%);background:rgba(0,0,0,.6);padding:2px 5px;border-radius:3px;font-size:9px;white-space:nowrap}
#ctrl{display:none;position:fixed;inset:0;pointer-events:none;z-index:40}
#ctrl.on{display:block}
#joy{position:absolute;left:16px;bottom:16px;width:100px;height:100px;pointer-events:all}
#base{width:100%;height:100%;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.2);border-radius:50%;position:relative}
#stick{width:38px;height:38px;background:#00e5ff;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
#look{position:absolute;right:0;top:0;width:50%;height:65%;pointer-events:all}
.mb{position:absolute;right:16px;width:52px;height:52px;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;pointer-events:all}
#bj{bottom:16px}
#ba{bottom:80px;right:80px;background:rgba(168,85,247,.2);border-color:#a855f7}
canvas{display:block;width:100%;height:100%;position:fixed;top:0;left:0;z-index:1}
</style>
</head>
<body>
<div id="load"><div class="spin"></div><p>Подготовка мира...</p></div>
<div id="menu">  <h1>🧱 ROBLOX 3D</h1>
  <p style="color:#666;font-size:12px">Оптимизировано • Стабильно • Мгновенный запуск</p>
  <div class="grid">

  </div>
</div>
<div id="game">
  <canvas id="c"></canvas>
  <div id="hud"><span id="name">Player</span><span id="on">● 1</span><span id="ch" style="display:none;color:#ffd700">🧀 0/9</span></div>
  <div id="chat"><div id="box"></div><input id="inp" placeholder="Чат..."></div>
  <button id="exit">🏠 Меню</button>
  <div id="tags"></div>
  <div id="ctrl"><div id="joy"><div id="base"><div id="stick"></div></div></div><div id="look"></div><div id="bj" class="mb">⬆️</div><div id="ba" class="mb">🎯</div></div>
</div>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
const mob='ontouchstart'in window||navigator.maxTouchPoints>0||innerWidth<768;
const C=5,G=19;
const S={ws:null,id:null,name:localStorage.getItem('n')||'',gid:'menu',pl:new Map(),sc:null,cam:null,ren:null,me:null,yaw:0,pit:0,inp:{f:0,r:0,j:false,a:false},jId:null,lId:null,js:{x:0,y:0},lp:{x:0,y:0},w:[],ch:new Map(),rat:null,ex:null,ct:null,pm:null,dp:[],mg:[],on:false};
const ld=document.getElementById('load'),mn=document.getElementById('menu'),gm=document.getElementById('game'),bx=document.getElementById('box'),ip=document.getElementById('inp');
if(S.name){ld.classList.add('hidden');mn.classList.add('on');}else{
  document.getElementById('reg-prompt')?.remove();
  const r=prompt('Введите никнейм:','Player');
  if(r&&r.trim().length>1){S.name=r.trim();localStorage.setItem('n',S.name);ld.classList.add('hidden');mn.classList.add('on');}
  else location.reload();
}
document.querySelectorAll('.card').forEach(c=>c.querySelector('.btn').onclick=()=>go(c.dataset.g));
function go(g){
  S.gid=g; mn.classList.remove('on'); gm.classList.add('on'); ld.classList.remove('hidden');
  document.getElementById('name').textContent=S.name;
  document.getElementById('ch').style.display=g==='c'?'inline':'none';
  bx.innerHTML=''; add('sys','Инициализация...');
  init3D(); setup(); conn();
  // ГАРАНТИРОВАННОЕ СКРЫТИЕ ЗАГРУЗКИ
  setTimeout(()=>ld.classList.add('hidden'), 2500);
}
document.getElementById('exit').onclick=()=>{gm.classList.remove('on');mn.classList.add('on');ld.classList.remove('hidden');if(S.ws)S.ws.close();if(S.ren){S.ren.dispose();S.ren=null;}};
function conn(){
  if(S.ws?.readyState===1) return;
  const pr=location.protocol==='https:'?'wss:':'ws:';
  try{
    S.ws=new WebSocket(`${pr}//${location.host}`);

      try{
        const d=JSON.parse(e.data);        if(d.type==='reg'){S.id=d.id;S.ws.send(JSON.stringify({pid:S.id,type:'join',gid:S.gid}));S.on=true;}
        if(d.type==='ex') d.players.forEach(p=>spR(p));
        if(d.type==='join'){if(!d.player.dead)spR(d.player);else dieFx(d.player.x,d.player.y,d.player.z);}
        if(d.type==='left') rmR(d.id);
        if(d.type==='mv'){const p=S.pl.get(d.player.id);if(p){p.m.position.set(d.player.x,d.player.y,d.player.z);p.m.rotation.y=-d.player.yaw;}}
        if(d.type==='snap'){

          });

          if(d.exit&&S.ex) S.ex.visible=d.exit.open;
          document.getElementById('on').textContent=`● ${d.players.length+1}`;
        }
        if(d.type==='die'){
          if(d.pid===S.id){S.me.userData.dead=true;S.sc.remove(S.me);const b=document.createElement('button');b.textContent='💀 Возродиться';b.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);padding:12px 24px;font-size:18px;background:#ef4444;color:#fff;border:none;border-radius:8px;cursor:pointer;z-index:100;';b.onclick=()=>{S.ws.send(JSON.stringify({pid:S.id,type:'resp'}));S.me.userData.dead=false;b.remove();S.sc.add(S.me);unstuck();};document.body.appendChild(b);}
          else if(S.pl.has(d.pid)){dieFx(d.x,d.y,d.z);S.sc.remove(S.pl.get(d.pid).m);S.pl.delete(d.pid);}

          S.pm=d; S.mg=[];const h=9.5;for(let y=0;y<G;y++){S.mg[y]=[];for(let x=0;x<G;x++)S.mg[y][x]={w:false};}
          d.walls.forEach(w=>{const gx=Math.floor(w.x/C+h),gz=Math.floor(w.z/C+h);if(gx>=0&&gx<G&&gz>=0&&gz<G)S.mg[gz][gx].w=true;});

        if(d.type==='cheese') document.getElementById('ch').textContent=`🧀 ${d.t}/9`;
        if(d.type==='win'){alert(`🏆 Победа! Счёт: ${d.score}`);document.getElementById('exit').click();}
        if(d.type==='chat') add(d.name,d.msg);
      }catch(err){}
    };
    S.ws.onclose=()=>{S.on=false;add('sys','Переподключение...');setTimeout(conn,3000);};
  }catch(e){add('sys','Ошибка сети.');}
}
function spM(d){
  const mt=S.ct?new THREE.MeshStandardMaterial({map:S.ct,color:0xffffff,roughness:.5}):new THREE.MeshStandardMaterial({color:0xddaa00});
  d.walls.forEach(w=>{const m=new THREE.Mesh(new THREE.BoxGeometry(w.w,w.h||6,w.d),mt);m.position.set(w.x,(w.h||6)/2,w.z);m.castShadow=true;m.receiveShadow=true;S.sc.add(m);S.w.push({m,x:w.x,z:w.z,w:w.w,d:w.d,h:w.h||6});});
  if(d.green) d.green.forEach(g=>{const z=new THREE.Mesh(new THREE.PlaneGeometry(5,5),new THREE.MeshBasicMaterial({color:0x00ff88,transparent:true,opacity:.2,side:THREE.DoubleSide}));z.rotation.x=-Math.PI/2;z.position.set(g.x,.05,g.z);S.sc.add(z);});
  d.cheeses.forEach(c=>{if(!c.col)spCh(c);});
}
function mkRig(c){
  const g=new THREE.Group(),mB=new THREE.MeshStandardMaterial({color:c}),mS=new THREE.MeshStandardMaterial({color:0xffcc88}),mP=new THREE.MeshStandardMaterial({color:0x333366});
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(1,1.2,.6),mB),{position:new THREE.Vector3(0,1.8,0),castShadow:true}));
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(.8,.8,.8),mS),{position:new THREE.Vector3(0,2.8,0),castShadow:true}));
  function lb(w,h,d,mt,x,y,z){const p=new THREE.Group();p.position.set(x,y,z);p.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mt),{position:new THREE.Vector3(0,-h/2,0),castShadow:true}));g.add(p);return p;}
  return{g,lA:lb(.35,1.1,.35,mS,-.7,2.3,0),rA:lb(.35,1.1,.35,mS,.7,2.3,0),lL:lb(.4,1.1,.4,mP,-.25,1.15,0),rL:lb(.4,1.1,.4,mP,.25,1.15,0)};
}
function spR(d){
  if(d.id===S.id) return;
  const r=mkRig(d.gid==='s'?(d.team==='red'?0xff2a2a:0x2a8aff):0x3366cc);
  r.g.position.set(d.x,d.y,d.z);r.g.rotation.y=-d.yaw;S.sc.add(r.g);S.pl.set(d.id,{m:r.g,a:d.anim,n:d.name});
  const t=document.createElement('div');t.className='tag';t.textContent=d.n;document.getElementById('tags').appendChild(t);S.pl.get(d.id).t=t;
}function rmR(id){const p=S.pl.get(id);if(p){S.sc.remove(p.m);if(p.t)p.t.remove();S.pl.delete(id);}}
function spCh(c){
  const g=new THREE.Group();g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(.15,.15,1.2,8),new THREE.MeshStandardMaterial({color:0x5c3a21})),{position:new THREE.Vector3(0,.6,0)}));
  const tp=new THREE.Mesh(new THREE.BoxGeometry(1.4,.1,1.4),new THREE.MeshStandardMaterial({color:0x6b4423}));tp.position.y=1.25;tp.castShadow=true;tp.receiveShadow=true;g.add(tp);
  const mt=S.ct?new THREE.MeshStandardMaterial({map:S.ct,color:0xffffff,roughness:.3}):new THREE.MeshStandardMaterial({color:0xffd700});
  const ch=new THREE.Mesh(new THREE.ConeGeometry(.45,.7,8),mt);ch.position.y=1.65;ch.rotation.x=Math.PI/6;ch.castShadow=true;g.add(ch);g.position.set(c.x,0,c.z);S.sc.add(g);S.ch.set(c.id,g);
}
function dieFx(x,y,z){const cl=[0xff3333,0x3366cc,0xffcc88,0x333366];for(let i=0;i<8;i++){const m=new THREE.Mesh(new THREE.BoxGeometry(.25,.25,.25),new THREE.MeshStandardMaterial({color:cl[i%4]}));m.position.set(x+(Math.random()-.5)*1.2,y+Math.random()*1.5,z+(Math.random()-.5)*1.2);S.sc.add(m);S.dp.push({m,v:new THREE.Vector3((Math.random()-.5)*3,Math.random()*3+1,(Math.random()-.5)*3),t:2+Math.random()});}}
function unstuck(){if(!S.me||!S.mg.length)return;const h=9.5,gx=Math.floor(S.me.position.x/C+h),gz=Math.floor(S.me.position.z/C+h);if(gx>=0&&gx<G&&gz>=0&&gz<G&&S.mg[gz][gx].w){S.me.position.set((1-h)*C,1,(1-h)*C);}}
async function loadA(){
  try{const t=await new Promise(r=>new THREE.TextureLoader().load('cheese_texture.png',x=>r(x),undefined,()=>r(null)));if(t){t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(2,2);S.ct=t;S.w.forEach(w=>w.m.material.map=t);S.ch.forEach(c=>c.children[2].material.map=t);}}catch(e){}
  try{const g=await new Promise(r=>new (await import('three/addons/loaders/GLTFLoader.js')).GLTFLoader().load('rat.glb',x=>r(x.scene),undefined,()=>r(null)));if(g){const b=new THREE.Box3().setFromObject(g);g.scale.setScalar(3.5/(b.max.y-b.min.y));g.position.set(0,.5,0);g.traverse(n=>{if(n.isMesh){n.castShadow=true;n.receiveShadow=true;}});S.sc.add(g);S.rat=g;}}catch(e){}
}
function init3D(){
  const cv=document.getElementById('c');cv.width=innerWidth;cv.height=innerHeight;
  S.sc=new THREE.Scene();S.sc.background=new THREE.Color(0x1a1a24);S.sc.fog=new THREE.Fog(0x1a1a24,20,50);
  S.cam=new THREE.PerspectiveCamera(70,cv.width/cv.height,.1,80);
  S.ren=new THREE.WebGLRenderer({canvas:cv,antialias:true,powerPreference:'high-performance'});
  S.ren.setSize(cv.width,cv.height);S.ren.setPixelRatio(Math.min(devicePixelRatio,2));
  S.ren.shadowMap.enabled=true;S.ren.shadowMap.type=THREE.PCFSoftShadowMap;
  S.sc.add(new THREE.AmbientLight(0xffffff,.8));
  const sun=new THREE.DirectionalLight(0xffffff,1);sun.position.set(10,20,10);sun.castShadow=true;sun.shadow.mapSize.set(1024,1024);S.sc.add(sun);
  const fl=new THREE.Mesh(new THREE.PlaneGeometry(100,100),new THREE.MeshStandardMaterial({color:0x22222a}));fl.rotation.x=-Math.PI/2;fl.receiveShadow=true;S.sc.add(fl);

  if(S.gid==='c'){const ex=new THREE.Mesh(new THREE.TorusGeometry(2,.2,8,16),new THREE.MeshStandardMaterial({color:0x00ff88,emissive:0x00ff88,emissiveIntensity:.8}));ex.rotation.x=Math.PI/2;ex.position.y=2;ex.visible=false;S.sc.add(ex);S.ex=ex;}
  loop();
}
function setup(){
  if(!mob){
    document.addEventListener('keydown',e=>{if(e.code==='KeyW')S.inp.f=-1;if(e.code==='KeyS')S.inp.f=1;if(e.code==='KeyA')S.inp.r=-1;if(e.code==='KeyD')S.inp.r=1;if(e.code==='Space')S.inp.j=true;if(e.code==='KeyE')S.inp.a=true;});
    document.addEventListener('keyup',e=>{if(['KeyW','KeyS'].includes(e.code))S.inp.f=0;if(['KeyA','KeyD'].includes(e.code))S.inp.r=0;if(e.code==='Space')S.inp.j=false;if(e.code==='KeyE')S.inp.a=false;});
    document.addEventListener('mousemove',e=>{if(document.pointerLockElement){S.yaw-=e.movementX*.002;S.pit=Math.max(-1.2,Math.min(1.2,S.pit-e.movementY*.002));}});
    document.addEventListener('click',()=>{if(!document.pointerLockElement)S.ren.domElement.requestPointerLock();});
  }else{
    document.getElementById('ctrl').classList.add('on');
    const j=document.getElementById('joy'),sk=document.getElementById('stick'),lk=document.getElementById('look');
    j.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];S.jId=t.identifier;S.js={x:t.clientX,y:t.clientY};},{passive:false});
    lk.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];S.lId=t.identifier;S.lp={x:t.clientX,y:t.clientY};},{passive:false});
    window.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches){if(t.identifier===S.jId){const dx=t.clientX-S.js.x,dy=t.clientY-S.js.y,ds=Math.min(40,Math.hypot(dx,dy)),ag=Math.atan2(dy,dx);sk.style.transform=`translate(calc(-50% + ${Math.cos(ag)*ds}px), calc(-50% + ${Math.sin(ag)*ds}px))`;S.inp.r=Math.cos(ag)*(ds/40);S.inp.f=Math.sin(ag)*(ds/40);}if(t.identifier===S.lId){S.yaw-=(t.clientX-S.lp.x)*.008;S.pit=Math.max(-1.2,Math.min(1.2,S.pit-(t.clientY-S.lp.y)*.008));S.lp={x:t.clientX,y:t.clientY};}}},{passive:false});
    window.addEventListener('touchend',e=>{for(const t of e.changedTouches){if(t.identifier===S.jId){S.jId=null;S.inp.f=0;S.inp.r=0;sk.style.transform='translate(-50%,-50%)';}if(t.identifier===S.lId)S.lId=null;}});
    document.getElementById('bj').addEventListener('touchstart',e=>{e.preventDefault();S.inp.j=true;});document.getElementById('bj').addEventListener('touchend',()=>S.inp.j=false);
    document.getElementById('ba').addEventListener('touchstart',e=>{e.preventDefault();S.inp.a=true;});document.getElementById('ba').addEventListener('touchend',()=>S.inp.a=false);
  }
  ip.addEventListener('keypress',e=>{if(e.key==='Enter'&&e.target.value.trim()&&S.ws?.readyState===1){S.ws.send(JSON.stringify({pid:S.id,type:'chat',msg:e.target.value.trim()}));add(S.name,e.target.value.trim(),true);e.target.value='';}});
}
let lt=0;function loop(){requestAnimationFrame(loop);const dt=Math.min((performance.now()-lt)/1000,.1);lt=performance.now();
for(let i=S.dp.length-1;i>=0;i--){const d=S.dp[i];d.t-=dt;d.v.y-=12*dt;d.m.position.add(d.v.clone().multiplyScalar(dt));d.m.rotation.x+=dt*4;d.m.rotation.z+=dt*2;if(d.t<=0||d.m.position.y<-4){S.sc.remove(d.m);S.dp.splice(i,1);}}
if(S.me&&!S.me.userData.dead){
