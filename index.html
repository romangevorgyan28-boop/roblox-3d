<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🧱 Roblox 3D Ultimate</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;color:#fff;font-family:system-ui,sans-serif;overflow:hidden}
#loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a12;z-index:100}
.spinner{width:40px;height:40px;border:4px solid #333;border-top-color:#00e5ff;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{margin-top:12px;color:#888;font-size:13px}
#game{display:none;position:fixed;inset:0}
#hud{position:fixed;top:10px;left:10px;background:rgba(0,0,0,0.6);padding:6px 10px;border-radius:6px;font-size:12px}
#cross{position:fixed;top:50%;left:50%;width:8px;height:8px;background:#fff;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none}
#exit{position:fixed;top:10px;right:10px;background:#f33;color:#fff;border:none;padding:5px 10px;border-radius:4px;cursor:pointer}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Подключение к серверу...</p>
</div>

<div id="game">
  <canvas id="c"></canvas>
  <div id="hud">Онлайн: <span id="count">0</span></div>
  <div id="cross"></div>
  <button id="exit" onclick="location.reload()">🏠 Выход</button>
</div>

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

let ws, scene, cam, ren, playerMesh, others = {};
let yaw = 0, pitch = 0, keys = {};

window.startGame = () => {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  if (!document.pointerLockElement) document.body.requestPointerLock();
  init();
};

function init() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'ready' }));
  };

  ws.onmessage = (e) => {
    try {
      if (typeof e.data !== 'string') return;
      const d = JSON.parse(e.data);
      
      if (d.type === 'init') {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        init3D(); setupInput(); loop();
        d.players.forEach(p => spawnOther(p));
        document.getElementById('count').textContent = d.players.length + 1;
        return;
      }
      if (d.type === 'spawn') spawnOther(d);
      if (d.type === 'despawn') {
        if (others[d.id]) { scene.remove(others[d.id]); delete others[d.id]; }
        document.getElementById('count').textContent = Object.keys(others).length + 1;
        return;
      }
      if (d.type === 'snapshot') {
        const visible = new Set();
        d.players.forEach(p => {
          visible.add(p.id);
          if (!others[p.id]) spawnOther(p);
          else { others[p.id].position.set(p.x, p.y, p.z); others[p.id].rotation.y = -p.yaw; }
        });
        Object.keys(others).forEach(id => {
          if (!visible.has(parseInt(id))) { scene.remove(others[id]); delete others[id]; }
        });
        document.getElementById('count').textContent = visible.size + 1;
      }
    } catch (err) { /* Игнорируем не-JSON данные */ }
  };

  ws.onclose = () => {
    document.getElementById('loading').style.display = 'flex';
    document.querySelector('#loading p').textContent = 'Соединение потеряно. Перезагрузка...';
    setTimeout(() => location.reload(), 3000);
  };
}

function spawnOther(data) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({ color: 0x3333ff }));
  m.position.set(data.x, data.y, data.z);
  m.rotation.y = -data.yaw;
  scene.add(m);
  others[data.id] = m;
}

function init3D() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB);
  scene.fog = new THREE.Fog(0x87CEEB, 20, 70);

  cam = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 100);
  ren = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
  ren.setSize(innerWidth, innerHeight);
  ren.shadowMap.enabled = true;

  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  const sun = new THREE.DirectionalLight(0xffffff, 0.8);
  sun.position.set(10, 20, 10); sun.castShadow = true;
  scene.add(sun);

  const g = new THREE.Mesh(new THREE.PlaneGeometry(120,120), new THREE.MeshStandardMaterial({color:0x33aa33}));
  g.rotation.x = -Math.PI/2; g.receiveShadow = true; scene.add(g);

  playerMesh = new THREE.Mesh(new THREE.BoxGeometry(1,2,1), new THREE.MeshStandardMaterial({color:0xff3333}));
  scene.add(playerMesh);
}

function setupInput() {
  document.addEventListener('keydown', e => keys[e.code] = true);
  document.addEventListener('keyup', e => keys[e.code] = false);
  document.addEventListener('mousemove', e => {
    if (document.pointerLockElement) {
      yaw -= e.movementX * 0.003;
      pitch = Math.max(-1.2, Math.min(1.2, pitch - e.movementY * 0.003));
    }
  });
}

setInterval(() => {
  if (ws?.readyState === 1) {
    ws.send(JSON.stringify({
      type: 'input',
      f: (keys['KeyW']?1:0) - (keys['KeyS']?1:0),
      r: (keys['KeyD']?1:0) - (keys['KeyA']?1:0),
      jump: !!keys['Space'],
      yaw: -yaw
    }));
  }
}, 50);

function loop() {
  requestAnimationFrame(loop);
  if (!playerMesh) return;
  const cd = 6, ch = 3.5;
  cam.position.set(playerMesh.position.x + Math.sin(yaw)*cd, playerMesh.position.y + ch + Math.sin(pitch)*1.5, playerMesh.position.z + Math.cos(yaw)*cd);
  cam.lookAt(playerMesh.position.x, playerMesh.position.y+1, playerMesh.position.z);
  ren.render(scene, cam);
}

window.addEventListener('resize', () => {
  if (cam && ren) { cam.aspect = innerWidth/innerHeight; cam.updateProjectionMatrix(); ren.setSize(innerWidth, innerHeight); }
});
</script>
</body>
</html>
