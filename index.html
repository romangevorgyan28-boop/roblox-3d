<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🧱 Roblox 3D Ultimate</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;outline:none;touch-action:none}
body{overflow:hidden;background:#05050a;font-family:system-ui,sans-serif;color:#fff}
#load{position:fixed;inset:0;background:#05050a;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s}
#load.hidden{opacity:0;pointer-events:none}
.spin{width:40px;height:40px;border:3px solid #222;border-top-color:#00e5ff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#load p{margin-top:10px;color:#777;font-size:13px}
#skip{margin-top:12px;padding:6px 14px;background:#222;color:#aaa;border:1px solid #444;border-radius:6px;cursor:pointer;font-size:12px}
#skip:hover{background:#333;color:#fff}
#menu{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;padding:20px;background:radial-gradient(circle at 50% 30%,#0f172a,#000);overflow-y:auto;z-index:100}
#menu.on{display:flex}
h1{font-size:clamp(26px,5vw,36px);background:linear-gradient(90deg,#fff,#00e5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;max-width:800px;width:100%;margin-top:16px}
.card{background:rgba(20,20,30,0.8);border:1px solid #333;border-radius:8px;padding:12px;cursor:pointer;transition:.2s}
.card:hover{border-color:#00e5ff;transform:translateY(-2px)}
.card h3{font-size:15px;margin-bottom:2px}
.card p{font-size:10px;color:#aaa;margin-bottom:6px}
.btn{width:100%;padding:7px;background:#00e5ff;color:#000;border:none;border-radius:5px;font-weight:bold;cursor:pointer;font-size:13px}
#game{display:none;position:fixed;inset:0}
#game.on{display:block}
#hud{position:fixed;top:0;left:0;width:100%;height:32px;background:linear-gradient(180deg,rgba(0,0,0,.6),transparent);display:flex;align-items:center;justify-content:space-between;padding:0 8px;z-index:50;font-size:11px}
#hint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.7);padding:8px 16px;border-radius:6px;font-size:14px;display:none;z-index:60;pointer-events:none}
#chat{position:fixed;top:8px;left:8px;width:220px;z-index:40;pointer-events:none}
#box{max-height:120px;overflow-y:auto;padding:5px;background:rgba(0,0,0,.4);border-radius:5px 5px 0 0;border:1px solid #333;border-bottom:none;font-size:10px;pointer-events:auto}
#inp{width:100%;padding:4px 7px;background:rgba(0,0,0,.6);border:1px solid #333;border-radius:0 0 5px 5px;color:#fff;font-size:10px;pointer-events:auto}
.msg{margin:2px 0;line-height:1.1}
.msg .n{color:#a78bfa;font-weight:bold}
.sys{color:#34d399;font-style:italic}
#exit{position:fixed;top:5px;right:8px;background:#ef4444;color:#fff;border:none;padding:3px 7px;border-radius:3px;cursor:pointer;z-index:60;font-size:10px}
#tags{position:fixed;inset:0;pointer-events:none;z-index:30}
.tag{position:absolute;transform:translate(-50%,-100%);background:rgba(0,0,0,.5);padding:1px 4px;border-radius:2px;font-size:8px;white-space:nowrap}
#ctrl{display:none;position:fixed;inset:0;pointer-events:none;z-index:40}
#ctrl.on{display:block}
#joy{position:absolute;left:14px;bottom:14px;width:90px;height:90px;pointer-events:all}
#base{width:100%;height:100%;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:50%;position:relative}
#stick{width:34px;height:34px;background:#00e5ff;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
#look{position:absolute;right:0;top:0;width:50%;height:60%;pointer-events:all}
.mb{position:absolute;right:14px;width:48px;height:48px;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;pointer-events:all}
#bj{bottom:14px}
#ba{bottom:74px;right:74px;background:rgba(168,85,247,.15);border-color:#a855f7}
#editorBar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);border:1px solid #00e5ff;border-radius:8px;padding:8px;display:none;gap:8px;z-index:70}
#editorBar.on{display:flex}
.ebtn{padding:6px 12px;background:#1a1a2e;border:1px solid #00e5ff;color:#00e5ff;border-radius:4px;cursor:pointer;font-size:11px}
.ebtn:hover{background:#00e5ff;color:#000}
canvas{display:block;width:100%;height:100%;position:fixed;top:0;left:0;z-index:1}
</style>
</head>
<body>
<div id="load"><div class="spin"></div><p id="ltxt">Подготовка...</p><button id="skip">⏭ Пропустить</button></div>
<div id="menu">
  <h1>🧱 ROBLOX 3D</h1>
  <p style="color:#555;font-size:11px">Редактор • Коллизии • Сбор на E</p>
  <div class="grid">
    <div class="card" data-g="b"><h3>🏡 Brookhaven RP</h3><p>Открытый мир</p><button class="btn">Войти</button></div>
    <div class="card" data-g="s"><h3>🔫 Team Shooter</h3><p>Командный бой</p><button class="btn">Войти</button></div>
    <div class="card" data-g="br"><h3>🧠 Steal a Brainrot</h3><p>Укради артефакт</p><button class="btn">Войти</button></div>
    <div class="card" data-g="c"><h3>🧀 Horror of Cheese</h3><p>Лабиринт с крысой</p><button class="btn">Войти</button></div>
    <div class="card" data-g="ed"><h3>🎨 Level Editor</h3><p>Строй уровни как в Roblox</p><button class="btn">Войти</button></div>
  </div>
</div>
<div id="game">
  <canvas id="c"></canvas>
  <div id="hud"><span id="name">Player</span><span id="on">● 1</span><span id="ch" style="display:none;color:#ffd700">🧀 0/6</span></div>
  <div id="hint">Нажми E чтобы собрать сыр</div>
  <div id="chat"><div id="box"></div><input id="inp" placeholder="Чат..."></div>
  <button id="exit">🏠 Меню</button>
  <div id="tags"></div>
  <div id="editorBar"><button class="ebtn" id="placeWall">🧱 Стена</button><button class="ebtn" id="selMode">✋ Выделить</button><button class="ebtn" id="delObj">🗑 Удалить</button><input type="file" id="mInp" accept=".glb,.gltf" style="display:none"><button class="ebtn" id="loadM">📦 Модель</button></div>
  <div id="ctrl"><div id="joy"><div id="base"><div id="stick"></div></div></div><div id="look"></div><div id="bj" class="mb">⬆️</div><div id="ba" class="mb">🎯</div></div>
</div>
<script>setTimeout(()=>document.getElementById('load')?.classList.add('hidden'),2500);document.getElementById('skip').onclick=()=>document.getElementById('load').classList.add('hidden');</script>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';
const mob='ontouchstart'in window||navigator.maxTouchPoints>0||innerWidth<768;
const C=5,G=13;
const S={ws:null,id:null,name:localStorage.getItem('n')||'Player',gid:'menu',pl:new Map(),sc:null,cam:null,ren:null,me:null,yaw:0,pit:0,inp:{f:0,r:0,j:false,a:false},jId:null,lId:null,js:{x:0,y:0},lp:{x:0,y:0},w:[],ch:new Map(),rat:null,ex:null,ct:null,pm:null,dp:[],mg:[],on:false,ed:false,sel:null,selOff:{x:0,z:0}};
const ld=document.getElementById('load'),mn=document.getElementById('menu'),gm=document.getElementById('game'),bx=document.getElementById('box'),ip=document.getElementById('inp'),hint=document.getElementById('hint'),ebar=document.getElementById('editorBar');
if(S.name){ld.classList.add('hidden');mn.classList.add('on');}else{const r=prompt('Никнейм:','Player');if(r&&r.trim().length>1){S.name=r.trim();localStorage.setItem('n',S.name);ld.classList.add('hidden');mn.classList.add('on');}else location.reload();}
document.querySelectorAll('.card').forEach(c=>c.querySelector('.btn').onclick=()=>go(c.dataset.g));
function go(g){
  ld.classList.add('hidden');try{
    S.gid=g;mn.classList.remove('on');gm.classList.add('on');
    document.getElementById('name').textContent=S.name;
    document.getElementById('ch').style.display=(g==='c')?'inline':'none';
    ebar.classList.toggle('on',g==='ed');S.ed=(g==='ed');
    bx.innerHTML='';add('sys','Запуск...');init3D();setup();conn();
  }catch(e){add('sys','Ошибка запуска');console.error(e);}
}
document.getElementById('exit').onclick=()=>{gm.classList.remove('on');mn.classList.add('on');ld.classList.remove('hidden');if(S.ws)S.ws.close();if(S.ren){S.ren.dispose();S.ren=null;}};
function conn(){
  if(S.ws?.readyState===1)return;
  const pr=location.protocol==='https:'?'wss:':'ws:';
  try{
    S.ws=new WebSocket(`${pr}//${location.host}`);
    S.ws.onopen=()=>{S.ws.send(JSON.stringify({type:'reg',name:S.name}));add('sys','Сеть OK');};
    S.ws.onmessage=e=>{
      try{
        const d=JSON.parse(e.data);
        if(d.type==='reg'){S.id=d.id;S.ws.send(JSON.stringify({pid:S.id,type:'join',gid:S.gid}));S.on=true;}
        if(d.type==='ex')d.players.forEach(p=>spR(p));
        if(d.type==='join'){if(!d.player.dead)spR(d.player);else dieFx(d.player.x,d.player.y,d.player.z);}
        if(d.type==='left')rmR(d.id);
        if(d.type==='mv'){const p=S.pl.get(d.player.id);if(p){p.m.position.set(d.player.x,d.player.y,d.player.z);p.m.rotation.y=-d.player.yaw;}}
        if(d.type==='snap'){
          d.players.forEach(p=>{
            if(!S.pl.has(p.id)&&!p.dead)spR(p);
            else if(!p.dead){const r=S.pl.get(p.id);r.m.position.x+=(p.x-r.m.position.x)*.12;r.m.position.y+=(p.y-r.m.position.y)*.12;r.m.position.z+=(p.z-r.m.position.z)*.12;r.m.rotation.y+=(-p.yaw-r.m.rotation.y)*.12;r.a=p.anim;}
          });
          if(d.rat&&S.rat){S.rat.position.x+=(d.rat.x-S.rat.position.x)*.15;S.rat.position.z+=(d.rat.z-S.rat.position.z)*.15;S.rat.rotation.y=-d.rat.yaw;}
          if(d.exit&&S.ex)S.ex.visible=d.exit.open;
          document.getElementById('on').textContent=`● ${d.players.length+1}`;
          if(d.editorObjects&&S.ed)syncEditor(d.editorObjects);
        }
        if(d.type==='die'){
          if(d.pid===S.id){S.me.userData.dead=true;S.sc.remove(S.me);const b=document.createElement('button');b.textContent='💀 Возродиться';b.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);padding:10px 20px;font-size:16px;background:#ef4444;color:#fff;border:none;border-radius:6px;cursor:pointer;z-index:100;';b.onclick=()=>{S.ws.send(JSON.stringify({pid:S.id,type:'resp'}));S.me.userData.dead=false;b.remove();S.sc.add(S.me);unstuck();};document.body.appendChild(b);}
          else if(S.pl.has(d.pid)){dieFx(d.x,d.y,d.z);S.sc.remove(S.pl.get(d.pid).m);S.pl.delete(d.pid);}
        }
        if(d.type==='map'){
          S.pm=d;S.mg=[];const h=G/2;for(let y=0;y<G;y++){S.mg[y]=[];for(let x=0;x<G;x++)S.mg[y][x]={w:false};}
          d.walls.forEach(w=>{const gx=Math.floor(w.x/C+h),gz=Math.floor(w.z/C+h);if(gx>=0&&gx<G&&gz>=0&&gz<G)S.mg[gz][gx].w=true;});
          if(S.ct)spM(d);else loadA().then(()=>spM(d)).catch(()=>spM(d));
        }
        if(d.type==='cheese')document.getElementById('ch').textContent=`🧀 ${d.t}/6`;
        if(d.type==='win'){alert(`🏆 Победа! ${d.score}`);document.getElementById('exit').click();}
        if(d.type==='chat')add(d.name,d.msg);
      }catch(err){}
    };
    S.ws.onclose=()=>{S.on=false;setTimeout(conn,2000);};
  }catch(e){add('sys','Ошибка сети.');}
}
function spM(d){
  try{
    const mt=S.ct?new THREE.MeshStandardMaterial({map:S.ct,color:0xffffff,roughness:.5}):new THREE.MeshStandardMaterial({color:0xddaa00});
    d.walls.forEach(w=>{const m=new THREE.Mesh(new THREE.BoxGeometry(w.w,w.h||6,w.d),mt);m.position.set(w.x,(w.h||6)/2,w.z);m.castShadow=true;m.receiveShadow=true;S.sc.add(m);S.w.push({m,x:w.x,z:w.z,w:w.w,d:w.d,h:w.h||6});});
    if(d.green)d.green.forEach(g=>{const z=new THREE.Mesh(new THREE.PlaneGeometry(5,5),new THREE.MeshBasicMaterial({color:0x00ff88,transparent:true,opacity:.2,side:THREE.DoubleSide}));z.rotation.x=-Math.PI/2;z.position.set(g.x,.05,g.z);S.sc.add(z);});
    d.cheeses.forEach(c=>{if(!c.col)spCh(c);});
  }catch(e){}
}
function mkRig(c){
  const g=new THREE.Group(),mB=new THREE.MeshStandardMaterial({color:c}),mS=new THREE.MeshStandardMaterial({color:0xffcc88}),mP=new THREE.MeshStandardMaterial({color:0x333366});
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(1,1.2,.6),mB),{position:new THREE.Vector3(0,1.8,0),castShadow:true}));
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(.8,.8,.8),mS),{position:new THREE.Vector3(0,2.8,0),castShadow:true}));
  function lb(w,h,d,mt,x,y,z){const p=new THREE.Group();p.position.set(x,y,z);p.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mt),{position:new THREE.Vector3(0,-h/2,0),castShadow:true}));g.add(p);return p;}
  return{g,lA:lb(.35,1.1,.35,mS,-.7,2.3,0),rA:lb(.35,1.1,.35,mS,.7,2.3,0),lL:lb(.4,1.1,.4,mP,-.25,1.15,0),rL:lb(.4,1.1,.4,mP,.25,1.15,0)};
}
function spR(d){
  if(d.id===S.id)return;
  try{
    const r=mkRig(d.gid==='s'?(d.team==='red'?0xff2a2a:0x2a8aff):0x3366cc);
    r.g.position.set(d.x,d.y,d.z);r.g.rotation.y=-d.yaw;S.sc.add(r.g);S.pl.set(d.id,{m:r.g,a:d.anim,n:d.name});
    const t=document.createElement('div');t.className='tag';t.textContent=d.n;document.getElementById('tags').appendChild(t);S.pl.get(d.id).t=t;
  }catch(e){}
}
function rmR(id){try{const p=S.pl.get(id);if(p){S.sc.remove(p.m);if(p.t)p.t.remove();S.pl.delete(id);}}catch(e){}}
function spCh(c){
  try{
    const g=new THREE.Group();g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(.15,.15,1.2,8),new THREE.MeshStandardMaterial({color:0x5c3a21})),{position:new THREE.Vector3(0,.6,0)}));
    const tp=new THREE.Mesh(new THREE.BoxGeometry(1.4,.1,1.4),new THREE.MeshStandardMaterial({color:0x6b4423}));tp.position.y=1.25;tp.castShadow=true;tp.receiveShadow=true;g.add(tp);
    const mt=S.ct?new THREE.MeshStandardMaterial({map:S.ct,color:0xffffff,roughness:.3}):new THREE.MeshStandardMaterial({color:0xffd700});
    const ch=new THREE.Mesh(new THREE.ConeGeometry(.45,.7,8),mt);ch.position.y=1.65;ch.rotation.x=Math.PI/6;ch.castShadow=true;g.add(ch);g.position.set(c.x,0,c.z);S.sc.add(g);S.ch.set(c.id,g);
  }catch(e){}
}
function dieFx(x,y,z){try{const cl=[0xff3333,0x3366cc,0xffcc88,0x333366];for(let i=0;i<6;i++){const m=new THREE.Mesh(new THREE.BoxGeometry(.2,.2,.2),new THREE.MeshStandardMaterial({color:cl[i%4]}));m.position.set(x+(Math.random()-.5)*1,y+Math.random()*1.2,z+(Math.random()-.5)*1);S.sc.add(m);S.dp.push({m,v:new THREE.Vector3((Math.random()-.5)*2,Math.random()*2+1,(Math.random()-.5)*2),t:1.5+Math.random()});}}catch(e){}}
function unstuck(){try{if(!S.me||!S.mg.length)return;const h=G/2,gx=Math.floor(S.me.position.x/C+h),gz=Math.floor(S.me.position.z/C+h);if(gx>=0&&gx<G&&gz>=0&&gz<G&&S.mg[gz][gx].w){S.me.position.set((1-h)*C,1,(1-h)*C);}}catch(e){}}
async function loadA(){
  try{const t=await new Promise(r=>new THREE.TextureLoader().load('cheese_texture.png',x=>r(x),undefined,()=>r(null)));if(t){t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(2,2);S.ct=t;S.w.forEach(w=>w.m.material.map=t);S.ch.forEach(c=>c.children[2].material.map=t);}}catch(e){}
  try{const l=await import('three/addons/loaders/GLTFLoader.js');const g=await new Promise(r=>new l.GLTFLoader().load('rat.glb',x=>r(x.scene),undefined,()=>r(null)));if(g){const b=new THREE.Box3().setFromObject(g);g.scale.setScalar(3.2/(b.max.y-b.min.y));g.position.set(0,.5,0);g.traverse(n=>{if(n.isMesh){n.castShadow=true;n.receiveShadow=true;}});S.sc.add(g);S.rat=g;}}catch(e){}
}
function init3D(){
  try{
    const cv=document.getElementById('c');cv.width=innerWidth;cv.height=innerHeight;
    S.sc=new THREE.Scene();S.sc.background=new THREE.Color(0x15151d);S.sc.fog=new THREE.Fog(0x15151d,12,35);
    S.cam=new THREE.PerspectiveCamera(65,cv.width/cv.height,.1,50);
    S.ren=new THREE.WebGLRenderer({canvas:cv,antialias:false,powerPreference:'default',failIfMajorPerformanceCaveat:false});
    S.ren.setSize(cv.width,cv.height);S.ren.setPixelRatio(Math.min(devicePixelRatio,1.5));
    S.ren.shadowMap.enabled=true;S.ren.shadowMap.type=THREE.BasicShadowMap;
    S.sc.add(new THREE.AmbientLight(0xffffff,.7));
    const sun=new THREE.DirectionalLight(0xffffff,.8);sun.position.set(8,15,8);sun.castShadow=true;sun.shadow.mapSize.set(512,512);S.sc.add(sun);
    const fl=new THREE.Mesh(new THREE.PlaneGeometry(60,60),new THREE.MeshStandardMaterial({color:0x22222a}));fl.rotation.x=-Math.PI/2;fl.receiveShadow=true;S.sc.add(fl);
    S.me=mkRig(0xff3333).g;S.me.position.y=1;S.me.userData.dead=false;S.sc.add(S.me);
    if(S.gid==='c'){const ex=new THREE.Mesh(new THREE.TorusGeometry(1.8,.15,8,12),new THREE.MeshStandardMaterial({color:0x00ff88,emissive:0x00ff88,emissiveIntensity:.6}));ex.rotation.x=Math.PI/2;ex.position.y=2;ex.visible=false;S.sc.add(ex);S.ex=ex;}
  }catch(e){console.error('[3D]',e);}
}
function setup(){
  try{
    if(!mob){
      document.addEventListener('keydown',e=>{if(e.code==='KeyW')S.inp.f=-1;if(e.code==='KeyS')S.inp.f=1;if(e.code==='KeyA')S.inp.r=-1;if(e.code==='KeyD')S.inp.r=1;if(e.code==='Space')S.inp.j=true;if(e.code==='KeyE')S.inp.a=true;});
      document.addEventListener('keyup',e=>{if(['KeyW','KeyS'].includes(e.code))S.inp.f=0;if(['KeyA','KeyD'].includes(e.code))S.inp.r=0;if(e.code==='Space')S.inp.j=false;if(e.code==='KeyE')S.inp.a=false;});
      document.addEventListener('mousemove',e=>{if(document.pointerLockElement){S.yaw-=e.movementX*.0015;S.pit=Math.max(-1,Math.min(1,S.pit-e.movementY*.0015));}});
      document.addEventListener('click',()=>{if(!document.pointerLockElement)S.ren.domElement.requestPointerLock();});
    }else{
      document.getElementById('ctrl').classList.add('on');
      const j=document.getElementById('joy'),sk=document.getElementById('stick'),lk=document.getElementById('look');
      j.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];S.jId=t.identifier;S.js={x:t.clientX,y:t.clientY};},{passive:false});
      lk.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];S.lId=t.identifier;S.lp={x:t.clientX,y:t.clientY};},{passive:false});
      window.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches){if(t.identifier===S.jId){const dx=t.clientX-S.js.x,dy=t.clientY-S.js.y,ds=Math.min(35,Math.hypot(dx,dy)),ag=Math.atan2(dy,dx);sk.style.transform=`translate(calc(-50% + ${Math.cos(ag)*ds}px), calc(-50% + ${Math.sin(ag)*ds}px))`;S.inp.r=Math.cos(ag)*(ds/35);S.inp.f=Math.sin(ag)*(ds/35);}if(t.identifier===S.lId){S.yaw-=(t.clientX-S.lp.x)*.006;S.pit=Math.max(-1,Math.min(1,S.pit-(t.clientY-S.lp.y)*.006));S.lp={x:t.clientX,y:t.clientY};}}},{passive:false});
      window.addEventListener('touchend',e=>{for(const t of e.changedTouches){if(t.identifier===S.jId){S.jId=null;S.inp.f=0;S.inp.r=0;sk.style.transform='translate(-50%,-50%)';}if(t.identifier===S.lId)S.lId=null;}});
      document.getElementById('bj').addEventListener('touchstart',e=>{e.preventDefault();S.inp.j=true;});document.getElementById('bj').addEventListener('touchend',()=>S.inp.j=false);
      document.getElementById('ba').addEventListener('touchstart',e=>{e.preventDefault();S.inp.a=true;});document.getElementById('ba').addEventListener('touchend',()=>S.inp.a=false);
    }
    ip.addEventListener('keypress',e=>{if(e.key==='Enter'&&e.target.value.trim()&&S.ws?.readyState===1){S.ws.send(JSON.stringify({pid:S.id,type:'chat',msg:e.target.value.trim()}));add(S.name,e.target.value.trim(),true);e.target.value='';}});
    
    // Редактор
    document.getElementById('placeWall').onclick=()=>{
      if(!S.ed||!S.ws)return;
      const gx=Math.round(S.me.position.x/C)*C, gz=Math.round(S.me.position.z/C)*C;
      S.ws.send(JSON.stringify({pid:S.id,type:'editorAction',action:'addWall',x:gx,z:gz}));
    };
    document.getElementById('selMode').onclick=()=>{
      S.sel=null;add('sys','Режим выделения. Кликни на объект.');
    };
    document.getElementById('delObj').onclick=()=>{
      if(S.sel!==null&&S.ws){S.ws.send(JSON.stringify({pid:S.id,type:'editorAction',action:'deleteObj',index:S.sel}));S.sel=null;}
    };
    document.getElementById('loadM').onclick=()=>document.getElementById('mInp').click();
    document.getElementById('mInp').addEventListener('change',e=>{
      const f=e.target.files[0];if(!f)return;
      const r=new FileReader();r.onload=ev=>{
        try{
          import('three/addons/loaders/GLTFLoader.js').then(mod=>{
            const l=new mod.GLTFLoader();
            l.load(URL.createObjectURL(new Blob([ev.target.result])),g=>{
              const m=g.scene;const b=new THREE.Box3().setFromObject(m);m.scale.setScalar(2/(b.max.y-b.min.y));
              m.position.set(S.me.position.x,0,S.me.position.z);m.castShadow=true;
              S.sc.add(m);S.w.push({m,x:m.position.x,z:m.position.z,w:2,d:2,h:2});
              if(S.ws)S.ws.send(JSON.stringify({pid:S.id,type:'editorAction',action:'addWall',x:m.position.x,z:m.position.z}));
            });
          });
        }catch(err){add('sys','Ошибка загрузки модели');}
      };r.readAsArrayBuffer(f);
    });
  }catch(e){}
}
let lt=0;function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min((performance.now()-lt)/1000,.08);lt=performance.now();
  try{
    for(let i=S.dp.length-1;i>=0;i--){const d=S.dp[i];d.t-=dt;d.v.y-=10*dt;d.m.position.add(d.v.clone().multiplyScalar(dt));d.m.rotation.x+=dt*3;if(d.t<=0||d.m.position.y<-3){S.sc.remove(d.m);S.dp.splice(i,1);}}
    if(S.me&&!S.me.userData.dead){
      const sp=.12,fw=new THREE.Vector3(-Math.sin(S.yaw),0,-Math.cos(S.yaw)),rt=new THREE.Vector3(Math.cos(S.yaw),0,-Math.sin(S.yaw));
      let mv=new THREE.Vector3();if(S.inp.f<0)mv.add(fw);if(S.inp.f>0)mv.sub(fw);if(S.inp.r<0)mv.sub(rt);if(S.inp.r>0)mv.add(rt);
      if(mv.length()>0){
        mv.normalize();const nx=S.me.position.x+mv.x*sp,nz=S.me.position.z+mv.z*sp,h=G/2,gx=Math.floor(nx/C+h),gz=Math.floor(nz/C+h);
        let blocked=(gx>=0&&gx<G&&gz>=0&&gz<G&&S.mg[gz]?.[gx]?.w);
        if(!blocked){S.me.position.x=nx;S.me.position.z=nz;}
        S.me.rotation.y=S.yaw+Math.PI;
      }
      if(S.inp.j&&S.me.position.y<=1.01){S.me.position.y=2.8;S.inp.j=false;}
      if(S.me.position.y>1)S.me.position.y-=.15;if(S.me.position.y<1)S.me.position.y=1;
      const mn=Math.abs(S.inp.f)>.1||Math.abs(S.inp.r)>.1,sp2=mn?3:0,am=mn?.4:0,tm=performance.now()*.006;
      S.me.children[2].rotation.x=Math.sin(tm*sp2)*am;S.me.children[3].rotation.x=-Math.sin(tm*sp2)*am;S.me.children[4].rotation.x=-Math.sin(tm*sp2)*am;S.me.children[5].rotation.x=Math.sin(tm*sp2)*am;
      if(S.on){S.ws.send(JSON.stringify({pid:S.id,type:'inp',f:S.inp.f,r:S.inp.r,j:S.inp.j,a:S.inp.a,yaw:S.yaw}));S.inp.a=false;}
      const cd=mob?3:5,ch=mob?2.2:3;
      S.cam.position.set(S.me.position.x+Math.sin(S.yaw)*cd,S.me.position.y+ch+Math.sin(S.pit)*1,S.me.position.z+Math.cos(S.yaw)*cd);
      S.cam.lookAt(S.me.position.x,S.me.position.y+1,S.me.position.z);
      S.pl.forEach((p)=>{
        if(p.t){const pos=p.m.position.clone();pos.y+=3;pos.project(S.cam);if(pos.z<1){p.t.style.display='block';p.t.style.left=(pos.x*.5+.5)*innerWidth+'px';p.t.style.top=(-pos.y*.5+.5)*innerHeight+'px';}else p.t.style.display='none';}
        const om=p.a===1,os=om?3:0,oa=om?.4:0;p.m.children[2].rotation.x=Math.sin(performance.now()*.006*os)*oa;p.m.children[3].rotation.x=-Math.sin(performance.now()*.006*os)*oa;p.m.children[4].rotation.x=-Math.sin(performance.now()*.006*os)*oa;p.m.children[5].rotation.x=Math.sin(performance.now()*.006*os)*oa;
      });
      S.ch.forEach(c=>{c.rotation.y+=.01;c.position.y=Math.sin(Date.now()*.0015)*.03;});
      
      // Подсказка сыра
      let nearCheese=false;
      S.ch.forEach(c=>{if(!c.collected&&Math.hypot(S.me.position.x-c.position.x,S.me.position.z-c.position.z)<4.5)nearCheese=true;});
      hint.style.display=nearCheese?'block':'none';
    }
    if(S.sc&&S.cam&&S.ren)S.ren.render(S.sc,S.cam);
  }catch(e){}
}
function add(n,m,self=false){const d=document.createElement('div');d.className='msg'+(self?'':' sys');d.innerHTML=self?`<span class="n">${n}:</span> ${m}`:m;bx.appendChild(d);bx.scrollTop=bx.scrollHeight;}
function syncEditor(objs){
  // Упрощенная синхронизация редактора
  S.w=S.w.filter(w=>!w.isEditor);
  objs.forEach((o,i)=>{
    if(o.type==='wall'){
      const m=new THREE.Mesh(new THREE.BoxGeometry(o.w,o.h,o.d),new THREE.MeshStandardMaterial({color:0x888888}));
      m.position.set(o.x,o.h/2,o.z);m.castShadow=true;m.receiveShadow=true;m.isEditor=true;
      S.sc.add(m);S.w.push({m,x:o.x,z:o.z,w:o.w,d:o.d,h:o.h,isEditor:true});
    }
  });
}
window.addEventListener('resize',()=>{try{if(S.cam&&S.ren){const cv=document.getElementById('c');cv.width=innerWidth;cv.height=innerHeight;S.cam.aspect=innerWidth/innerHeight;S.cam.updateProjectionMatrix();S.ren.setSize(innerWidth,innerHeight);}}catch(e){}});
</script>
