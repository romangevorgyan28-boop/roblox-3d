<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox 3D Ultimate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #fff; color: #191919; overflow-x: hidden; }
        
        /* НАВИГАЦИЯ */
        .navbar { display: flex; align-items: center; padding: 8px 16px; background: #fff; border-bottom: 1px solid #e0e0e0; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 24px; font-weight: 800; margin-right: 32px; display: flex; align-items: center; gap: 8px; }
        .search-bar { flex: 1; max-width: 400px; margin-right: 16px; }
        .search-bar input { width: 100%; padding: 8px 16px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
        .nav-right { display: flex; align-items: center; gap: 16px; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #00e5ff, #a855f7); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 14px; cursor: pointer; }
        
        /* БОКОВАЯ ПАНЕЛЬ */
        .container { display: flex; }
        .sidebar { width: 200px; padding: 16px 0; position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar-item { padding: 10px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-radius: 8px; margin: 2px 8px; transition: background 0.2s; }
        .sidebar-item:hover { background: #f2f2f2; }
        .sidebar-item.active { background: #e8f4f8; font-weight: 600; }
        .sidebar-icon { width: 20px; height: 20px; }
        
        /* ОСНОВНОЙ КОНТЕНТ */
        .main-content { margin-left: 200px; flex: 1; padding: 24px; }
        .section-title { font-size: 20px; font-weight: 700; margin: 24px 0 16px; display: flex; align-items: center; gap: 8px; }
        .section-title a { color: #191919; text-decoration: none; }
        .section-title a:hover { text-decoration: underline; }
        
        /* СЕТКА ИГР */
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
        .game-card { cursor: pointer; transition: transform 0.2s; }
        .game-card:hover { transform: translateY(-4px); }
        .game-thumbnail { width: 100%; aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; margin-bottom: 8px; background: #f2f2f2; }
        .game-thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        .game-title { font-size: 14px; font-weight: 600; line-height: 1.3; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .game-meta { font-size: 12px; color: #737373; display: flex; align-items: center; gap: 8px; }
        .rating { display: flex; align-items: center; gap: 4px; }
        .players { display: flex; align-items: center; gap: 4px; }
        
        /* ДРУЗЬЯ */
        .friends-scroll { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 8px; }
        .friend-item { text-align: center; min-width: 80px; cursor: pointer; }
        .friend-avatar { width: 80px; height: 80px; border-radius: 50%; background: #e0e0e0; margin-bottom: 6px; overflow: hidden; }
        .friend-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .friend-name { font-size: 12px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .friend-game { font-size: 11px; color: #737373; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* РЕГИСТРАЦИЯ */
        #reg-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .reg-box { background: #fff; padding: 32px; border-radius: 12px; text-align: center; max-width: 400px; width: 90%; }
        .reg-box h2 { margin-bottom: 16px; font-size: 24px; }
        .reg-input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 15px; }
        .reg-btn { width: 100%; padding: 12px; margin-top: 12px; background: #00e5ff; color: #000; border: none; border-radius: 8px; font-weight: 700; font-size: 16px; cursor: pointer; }
        .reg-btn:disabled { background: #ccc; cursor: not-allowed; }
        
        /* ИГРА */
        #game-ui { position: fixed; inset: 0; display: none; background: #000; z-index: 2000; }
        #game-canvas { width: 100%; height: 100%; }
        #exit-game { position: fixed; top: 16px; left: 16px; padding: 8px 16px; background: rgba(0,0,0,0.6); color: #fff; border: none; border-radius: 6px; cursor: pointer; z-index: 10; }
        
        /* СКРОЛЛБАР */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body>

<!-- РЕГИСТРАЦИЯ -->
<div id="reg-modal">
    <div class="reg-box">
        <h2>👋 Добро пожаловать!</h2>
        <p style="color:#666;margin-bottom:16px">Введите никнейм для входа</p>
        <input type="text" id="reg-input" class="reg-input" placeholder="Никнейм" maxlength="16">
        <div id="reg-error" style="color:#f44;margin:8px 0;font-size:13px"></div>
        <button id="reg-btn" class="reg-btn" disabled>Играть</button>
    </div>
</div>

<!-- НАВИГАЦИЯ -->
<nav class="navbar">
    <div class="logo">🧱 ROBLOX</div>
    <div class="search-bar">
        <input type="text" placeholder="Поиск">
    </div>
    <div class="nav-right">
        <div class="user-avatar" id="user-avatar">?</div>
    </div>
</nav>

<div class="container">
    <!-- БОКОВАЯ ПАНЕЛЬ -->
    <aside class="sidebar">
        <div class="sidebar-item active">
            <svg class="sidebar-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Home</span>
        </div>
        <div class="sidebar-item">
            <svg class="sidebar-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            <span>Charts</span>
        </div>
        <div class="sidebar-item">
            <svg class="sidebar-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span>Avatar</span>
        </div>
        <div class="sidebar-item">
            <svg class="sidebar-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span>Party</span>
        </div>
    </aside>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main class="main-content">
        <!-- ДРУЗЬЯ -->
        <h2 class="section-title">Friends (169) ›</h2>
        <div class="friends-scroll" id="friends-list">
            <div class="friend-item">
                <div class="friend-avatar" style="background:#ddd;display:flex;align-items:center;justify-content:center;font-size:24px">+</div>
                <div class="friend-name">Add Friends</div>
            </div>
        </div>

        <!-- РЕКОМЕНДАЦИИ -->
        <h2 class="section-title">Рекомендации для тебя</h2>
        <div class="games-grid">
            <div class="game-card" data-game="brookhaven">
                <div class="game-thumbnail" style="background:#90EE90;display:flex;align-items:center;justify-content:center;font-size:48px">🏡</div>
                <div class="game-title">🏡 Brookhaven RP</div>
                <div class="game-meta">
                    <span class="rating">👍 98%</span>
                    <span class="players">👥 125K</span>
                </div>
            </div>
            <div class="game-card" data-game="shooter">
                <div class="game-thumbnail" style="background:#FF6B6B;display:flex;align-items:center;justify-content:center;font-size:48px">🔫</div>
                <div class="game-title">🔫 Team Shooter</div>
                <div class="game-meta">
                    <span class="rating">👍 95%</span>
                    <span class="players">👥 89K</span>
                </div>
            </div>
            <div class="game-card" data-game="brainrot">
                <div class="game-thumbnail" style="background:#A855F7;display:flex;align-items:center;justify-content:center;font-size:48px">🧠</div>
                <div class="game-title">🧠 Steal a Brainrot</div>
                <div class="game-meta">
                    <span class="rating">👍 92%</span>
                    <span class="players">👥 67K</span>
                </div>
            </div>
            <div class="game-card" data-game="cheese">
                <div class="game-thumbnail" style="background:#FBBF24;display:flex;align-items:center;justify-content:center;font-size:48px">🧀</div>
                <div class="game-title">🧀 Horror of Cheese</div>
                <div class="game-meta">
                    <span class="rating">👍 96%</span>
                    <span class="players">👥 45K</span>
                </div>
            </div>
        </div>

        <!-- ПРОДОЛЖИТЬ -->
        <h2 class="section-title">Продолжить ›</h2>
        <div class="games-grid" id="continue-games">
            <p style="color:#666;grid-column:1/-1">Вы ещё не играли</p>
        </div>
    </main>
</div>

<!-- ИГРОВОЙ ИНТЕРФЕЙС -->
<div id="game-ui">
    <canvas id="game-canvas"></canvas>
    <button id="exit-game" onclick="exitGame()">🏠 В меню</button>
</div>

<script type="module">
// ===== ИМПОРТЫ THREE.JS =====
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

// ===== ГЛОБАЛЬНОЕ СОСТОЯНИЕ =====
const State = {
    ws: null,
    playerId: null,
    playerName: '',
    currentGame: null,
    scene: null,
    camera: null,
    renderer: null,
    playerMesh: null,
    keys: {},
    isMobile: /Android|iPhone|iPad/i.test(navigator.userAgent)
};

// ===== DOM ЭЛЕМЕНТЫ =====
const DOM = {
    regModal: document.getElementById('reg-modal'),
    regInput: document.getElementById('reg-input'),
    regBtn: document.getElementById('reg-btn'),
    regError: document.getElementById('reg-error'),
    userAvatar: document.getElementById('user-avatar'),
    gameUI: document.getElementById('game-ui'),
    canvas: document.getElementById('game-canvas'),
    friendsList: document.getElementById('friends-list'),
    continueGames: document.getElementById('continue-games')
};

// ===== ИНИЦИАЛИЗАЦИЯ =====
function init() {
    const saved = localStorage.getItem('r3d_name');
    if (saved) {
        State.playerName = saved;
        DOM.regModal.style.display = 'none';
        DOM.userAvatar.textContent = saved.charAt(0).toUpperCase();
    } else {
        DOM.regInput.addEventListener('input', checkName);
        DOM.regBtn.addEventListener('click', register);
        DOM.regInput.addEventListener('keypress', e => {
            if (e.key === 'Enter' && !DOM.regBtn.disabled) register();
        });
    }
    
    // КЛИКИ ПО ИГРАМ
    document.querySelectorAll('.game-card').forEach(card => {
        card.addEventListener('click', () => {
            const game = card.dataset.game;
            if (game) startGame(game);
        });
    });
}

function checkName() {
    const val = DOM.regInput.value.trim();
    if (val.length >= 2 && val.length <= 16) {
        DOM.regError.textContent = '';
        DOM.regBtn.disabled = false;
    } else {
        DOM.regError.textContent = val.length < 2 ? 'Минимум 2 символа' : 'Максимум 16 символов';
        DOM.regBtn.disabled = true;
    }
}

function register() {
    const name = DOM.regInput.value.trim();
    if (name.length < 2 || name.length > 16) return;
    
    State.playerName = name;
    localStorage.setItem('r3d_name', name);
    DOM.regModal.style.display = 'none';
    DOM.userAvatar.textContent = name.charAt(0).toUpperCase();
}

// ===== ЗАПУСК ИГРЫ =====
function startGame(gameId) {
    State.currentGame = gameId;
    DOM.gameUI.style.display = 'block';
    document.body.style.overflow = 'hidden';
    
    init3D();
    connect();
}

window.exitGame = function() {
    if (State.ws) State.ws.close();
    if (State.renderer) {
        State.renderer.dispose();
        State.renderer = null;
    }
    if (State.scene) {
        State.scene.traverse(obj => {
            if (obj.geometry) obj.geometry.dispose();
            if (obj.material) {
                if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
                else obj.material.dispose();
            }
        });
        State.scene = null;
    }
    
    DOM.gameUI.style.display = 'none';
    document.body.style.overflow = '';
    State.currentGame = null;
};

// ===== 3D ИНИЦИАЛИЗАЦИЯ =====
function init3D() {
    const cv = DOM.canvas;
    cv.width = window.innerWidth;
    cv.height = window.innerHeight;
    
    State.scene = new THREE.Scene();
    State.scene.background = new THREE.Color(State.currentGame === 'shooter' ? 0x1a1a24 : 0x87CEEB);
    
    State.camera = new THREE.PerspectiveCamera(70, cv.width/cv.height, 0.1, 100);
    State.renderer = new THREE.WebGLRenderer({ canvas: cv, antialias: true });
    State.renderer.setSize(cv.width, cv.height);
    
    // Освещение
    State.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(10, 20, 10);
    State.scene.add(sun);
    
    // Пол
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(50, 50),
        new THREE.MeshStandardMaterial({ color: State.currentGame === 'shooter' ? 0x333344 : 0x2a8a2a })
    );
    floor.rotation.x = -Math.PI/2;
    State.scene.add(floor);
    
    // Игрок
    State.playerMesh = new THREE.Mesh(
        new THREE.BoxGeometry(1, 2, 1),
        new THREE.MeshStandardMaterial({ color: 0xff3333 })
    );
    State.playerMesh.position.y = 1;
    State.scene.add(State.playerMesh);
    
    // Управление
    setupControls();
    gameLoop();
}

// ===== УПРАВЛЕНИЕ =====
function setupControls() {
    if (!State.isMobile) {
        document.addEventListener('keydown', e => {
            State.keys[e.code] = true;
        });
        document.addEventListener('keyup', e => {
            State.keys[e.code] = false;
        });
        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement) {
                State.camera.rotation.y -= e.movementX * 0.002;
            }
        });
        document.addEventListener('click', () => {
            if (!document.pointerLockElement) {
                State.renderer.domElement.requestPointerLock();
            }
        });
    }
}

// ===== ИГРОВОЙ ЦИКЛ =====
function gameLoop() {
    if (!State.playerMesh) return;
    
    const speed = 0.15;
    if (State.keys['KeyW']) State.playerMesh.position.z -= speed;
    if (State.keys['KeyS']) State.playerMesh.position.z += speed;
    if (State.keys['KeyA']) State.playerMesh.position.x -= speed;
    if (State.keys['KeyD']) State.playerMesh.position.x += speed;
    
    State.camera.position.copy(State.playerMesh.position);
    State.camera.position.y += 2;
    State.camera.lookAt(State.playerMesh.position);
    
    State.renderer.render(State.scene, State.camera);
    requestAnimationFrame(gameLoop);
}

// ===== СЕТЬ =====
function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    State.ws = new WebSocket(`${proto}//${location.host}`);
    
    State.ws.onopen = () => {
        State.ws.send(JSON.stringify({ type: 'register', name: State.playerName }));
    };
    
    State.ws.onmessage = (e) => {
        try {
            const data = JSON.parse(e.data);
            if (data.type === 'registered') {
                State.playerId = data.id;
                State.ws.send(JSON.stringify({ type: 'join', gameId: State.currentGame }));
            }
        } catch(err) {
            console.error('WS Error:', err);
        }
    };
    
    State.ws.onclose = () => {
        setTimeout(() => {
            if (State.currentGame) connect();
        }, 3000);
    };
}

// ===== ЗАПУСК =====
init();
</script>
</body>
</html>
