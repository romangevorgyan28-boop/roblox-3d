<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🧱 Roblox 3D Lite</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
  color: white;
  overflow: hidden;
  height: 100vh;
}

/* ===== ГЛАВНОЕ МЕНЮ ===== */
#main-menu {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  z-index: 100;
}

.menu-container {
  text-align: center;
  padding: 40px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  max-width: 500px;
  width: 90%;
}

h1 {
  font-size: 48px;
  margin-bottom: 10px;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
}

.subtitle {
  font-size: 16px;
  color: rgba(255, 255, 255, 0.8);
  margin-bottom: 40px;
}

.play-btn {
  padding: 18px 60px;
  font-size: 20px;
  font-weight: bold;
  background: linear-gradient(135deg, #00e5ff 0%, #00b4d8 100%);
  color: #000;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 15px rgba(0, 229, 255, 0.4);
}

.play-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0, 229, 255, 0.6);
}

.play-btn:active {
  transform: translateY(0);
}

.status {
  margin-top: 20px;
  font-size: 14px;
  color: rgba(255, 255, 255, 0.7);
}

/* ===== ИГРА ===== */
#game-container {
  display: none;
  position: fixed;
  inset: 0;
}

#game-canvas {
  display: block;
  width: 100%;
  height: 100%;
}

#hud {
  position: fixed;
  top: 10px;
  left: 10px;
  background: rgba(0, 0, 0, 0.6);
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 13px;
  pointer-events: none;
  z-index: 10;
}

#crosshair {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 8px;
  height: 8px;
  background: white;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 10;
}

#exit-btn {
  position: fixed;
  top: 10px;
  right: 10px;
  padding: 8px 16px;
  background: rgba(255, 50, 50, 0.8);
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  z-index: 10;
  transition: background 0.2s;
}

#exit-btn:hover {
  background: rgba(255, 50, 50, 1);
}

/* ===== ЗАГРУЗКА ===== */
#loading {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.9);
  z-index: 200;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 20px;
}

.spinner {
  width: 50px;
  height: 50px;
  border: 5px solid rgba(255, 255, 255, 0.1);
  border-top-color: #00e5ff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

#loading-text {
  color: white;
  font-size: 16px;
}

/* ===== ОШИБКА ===== */
#error-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.9);
  z-index: 300;
  align-items: center;
  justify-content: center;
}

.error-box {
  background: #1a1a2e;
  border: 2px solid #ff3333;
  padding: 30px;
  border-radius: 12px;
  text-align: center;
  max-width: 400px;
  width: 90%;
}

.error-box h2 {
  color: #ff3333;
  margin-bottom: 12px;
}

.error-box p {
  color: #888;
  margin-bottom: 20px;
  line-height: 1.5;
}

.retry-btn {
  padding: 10px 30px;
  background: #00e5ff;
  color: #000;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  font-size: 14px;
}

.retry-btn:hover {
  background: #00c4d8;
}
</style>
</head>
<body>

<!-- ГЛАВНОЕ МЕНЮ -->
<div id="main-menu">
  <div class="menu-container">
    <h1>🧱 Roblox 3D</h1>
    <p class="subtitle">Легковесный мультиплеер • Оптимизировано</p>
    <button class="play-btn" onclick="startGame()">▶️ ИГРАТЬ</button>
    <p class="status" id="menu-status">Готов к подключению</p>
  </div>
</div>

<!-- ЗАГРУЗКА -->
<div id="loading">
  <div class="spinner"></div>
  <div id="loading-text">Подключение к серверу...</div>
</div>

<!-- ИГРА -->
<div id="game-container">
  <canvas id="game-canvas"></canvas>
  <div id="hud">Игроков: <span id="player-count">0</span></div>
  <div id="crosshair"></div>
  <button id="exit-btn" onclick="leaveGame()">🏠 В меню</button>
</div>

<!-- ОШИБКА -->
<div id="error-modal">
  <div class="error-box">
    <h2>⚠️ Ошибка подключения</h2>
    <p id="error-message">Не удалось подключиться к серверу. Проверьте интернет и попробуйте снова.</p>
    <button class="retry-btn" onclick="retryConnection()">🔄 Повторить</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ===== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ =====
let ws = null;
let scene, camera, renderer;
let playerMesh;
let otherPlayers = new Map();
let myId = null;
let yaw = 0;
let pitch = 0;
let keys = {};
let isConnected = false;

// ===== ФУНКЦИИ МЕНЮ =====
window.startGame = function() {
  document.getElementById('main-menu').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';
  connectToServer();
};

window.leaveGame = function() {
  if (ws) {
    ws.close();
    ws = null;
  }
  isConnected = false;
  document.getElementById('game-container').style.display = 'none';
  document.getElementById('main-menu').style.display = 'flex';
  document.getElementById('menu-status').textContent = 'Готов к подключению';
  
  // Очистка сцены
  if (renderer) {
    renderer.dispose();
    renderer = null;
  }
  scene = null;
  camera = null;
  playerMesh = null;
  otherPlayers.clear();
};

window.retryConnection = function() {
  document.getElementById('error-modal').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';
  connectToServer();
};

function showError(message) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-message').textContent = message;
  document.getElementById('error-modal').style.display = 'flex';
}

// ===== ПОДКЛЮЧЕНИЕ К СЕРВЕРУ =====
function connectToServer() {
  try {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}`;
    
    ws = new WebSocket(wsUrl);
    
    ws.onopen = function() {
      console.log('[INFO] Connected to server');
      document.getElementById('menu-status').textContent = 'Подключено!';
    };
    
    ws.onmessage = function(event) {
      try {
        const data = JSON.parse(event.data);
        handleServerMessage(data);
      } catch (e) {
        console.warn('[WARN] Invalid JSON:', e);
      }
    };
    
    ws.onclose = function() {
      console.log('[INFO] Disconnected from server');
      isConnected = false;
      
      if (document.getElementById('game-container').style.display === 'block') {
        showError('Соединение потеряно. Переподключение...');
        setTimeout(() => {
          if (!isConnected) {
            document.getElementById('error-modal').style.display = 'none';
            document.getElementById('loading').style.display = 'flex';
            connectToServer();
          }
        }, 3000);
      }
    };
    
    ws.onerror = function(error) {
      console.error('[ERROR] WebSocket error:', error);
      showError('Ошибка сети. Проверьте подключение.');
    };
    
  } catch (e) {
    console.error('[ERROR] Failed to connect:', e);
    showError('Не удалось подключиться к серверу.');
  }
}

// ===== ОБРАБОТКА СООБЩЕНИЙ =====
function handleServerMessage(data) {
  if (data.type === 'init') {
    myId = data.playerId;
    isConnected = true;
    
    // Инициализация 3D
    init3D();
    setupInput();
    
    // Скрываем загрузку, показываем игру
    document.getElementById('loading').style.display = 'none';
    document.getElementById('game-container').style.display = 'block';
    
    // Запускаем цикл
    animate();
    
    // Спавним других игроков
    data.players.forEach(player => {
      spawnOtherPlayer(player);
    });
    
    updatePlayerCount();
  }
  
  if (data.type === 'playerJoined') {
    spawnOtherPlayer(data.player);
    updatePlayerCount();
  }
  
  if (data.type === 'playerLeft') {
    if (otherPlayers.has(data.playerId)) {
      scene.remove(otherPlayers.get(data.playerId));
      otherPlayers.delete(data.playerId);
      updatePlayerCount();
    }
  }
  
  if (data.type === 'snapshot') {
    // Обновляем позиции других игроков
    data.players.forEach(player => {
      if (player.id === myId) return;
      
      if (!otherPlayers.has(player.id)) {
        spawnOtherPlayer(player);
      } else {
        const mesh = otherPlayers.get(player.id);
        mesh.position.set(player.x, player.y, player.z);
        mesh.rotation.y = -player.yaw;
      }
    });
    
    updatePlayerCount();
  }
}

// ===== 3D ГРАФИКА =====
function init3D() {
  const canvas = document.getElementById('game-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  
  // Сцена
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB);
  scene.fog = new THREE.Fog(0x87CEEB, 20, 80);
  
  // Камера
  camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );
  
  // Рендерер
  renderer = new THREE.WebGLRenderer({ 
    canvas: canvas, 
    antialias: true,
    powerPreference: 'high-performance'
  });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  
  // Освещение
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambientLight);
  
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(10, 20, 10);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 1024;
  dirLight.shadow.mapSize.height = 1024;
  scene.add(dirLight);
  
  // Земля
  const groundGeometry = new THREE.PlaneGeometry(200, 200);
  const groundMaterial = new THREE.MeshStandardMaterial({ 
    color: 0x33aa33,
    roughness: 0.8
  });
  const ground = new THREE.Mesh(groundGeometry, groundMaterial);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);
  
  // Игрок
  const playerGeometry = new THREE.BoxGeometry(1, 2, 1);
  const playerMaterial = new THREE.MeshStandardMaterial({ color: 0xff3333 });
  playerMesh = new THREE.Mesh(playerGeometry, playerMaterial);
  playerMesh.position.y = 1;
  playerMesh.castShadow = true;
  scene.add(playerMesh);
  
  // Декорации (простые деревья)
  for (let i = 0; i < 10; i++) {
    createTree(
      (Math.random() - 0.5) * 100,
      (Math.random() - 0.5) * 100
    );
  }
}

function createTree(x, z) {
  const group = new THREE.Group();
  
  // Ствол
  const trunkGeo = new THREE.CylinderGeometry(0.3, 0.4, 2, 8);
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.y = 1;
  trunk.castShadow = true;
  group.add(trunk);
  
  // Листва
  const leavesGeo = new THREE.SphereGeometry(1.5, 8, 8);
  const leavesMat = new THREE.MeshStandardMaterial({ color: 0x228B22 });
  const leaves = new THREE.Mesh(leavesGeo, leavesMat);
  leaves.position.y = 3;
  leaves.castShadow = true;
  group.add(leaves);
  
  group.position.set(x, 0, z);
  scene.add(group);
}

function spawnOtherPlayer(data) {
  if (data.id === myId) return;
  
  const geometry = new THREE.BoxGeometry(1, 2, 1);
  const material = new THREE.MeshStandardMaterial({ color: 0x3333ff });
  const mesh = new THREE.Mesh(geometry, material);
  mesh.position.set(data.x, data.y, data.z);
  mesh.rotation.y = -data.yaw;
  mesh.castShadow = true;
  
  scene.add(mesh);
  otherPlayers.set(data.id, mesh);
}

// ===== УПРАВЛЕНИЕ =====
function setupInput() {
  // Клавиатура
  document.addEventListener('keydown', (e) => {
    keys[e.code] = true;
  });
  
  document.addEventListener('keyup', (e) => {
    keys[e.code] = false;
  });
  
  // Мышь (поворот камеры)
  document.addEventListener('mousemove', (e) => {
    if (document.pointerLockElement === renderer.domElement) {
      yaw -= e.movementX * 0.002;
      pitch -= e.movementY * 0.002;
      pitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitch));
    }
  });
  
  // Клик для захвата мыши
  renderer.domElement.addEventListener('click', () => {
    if (!document.pointerLockElement) {
      renderer.domElement.requestPointerLock();
    }
  });
}

// ===== ОТПРАВКА ДВИЖЕНИЯ =====
function sendMovement() {
  if (!ws || ws.readyState !== WebSocket.OPEN || !playerMesh) return;
  
  const speed = 0.15;
  const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
  const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
  
  let moveX = 0;
  let moveZ = 0;
  
  if (keys['KeyW']) {
    moveX += forward.x * speed;
    moveZ += forward.z * speed;
  }
  if (keys['KeyS']) {
    moveX -= forward.x * speed;
    moveZ -= forward.z * speed;
  }
  if (keys['KeyA']) {
    moveX -= right.x * speed;
    moveZ -= right.z * speed;
  }
  if (keys['KeyD']) {
    moveX += right.x * speed;
    moveZ += right.z * speed;
  }
  
  playerMesh.position.x += moveX;
  playerMesh.position.z += moveZ;
  playerMesh.rotation.y = yaw + Math.PI;
  
  // Границы
  playerMesh.position.x = Math.max(-50, Math.min(50, playerMesh.position.x));
  playerMesh.position.z = Math.max(-50, Math.min(50, playerMesh.position.z));
  
  // Отправляем на сервер
  ws.send(JSON.stringify({
    type: 'move',
    x: playerMesh.position.x,
    y: playerMesh.position.y,
    z: playerMesh.position.z,
    yaw: yaw
  }));
}

// ===== КАМЕРА =====
function updateCamera() {
  if (!playerMesh || !camera) return;
  
  const distance = 6;
  const height = 3;
  
  camera.position.x = playerMesh.position.x + Math.sin(yaw) * distance;
  camera.position.z = playerMesh.position.z + Math.cos(yaw) * distance;
  camera.position.y = playerMesh.position.y + height;
  
  camera.lookAt(playerMesh.position.x, playerMesh.position.y + 1, playerMesh.position.z);
}

// ===== СЧЕТЧИК ИГРОКОВ =====
function updatePlayerCount() {
  const count = otherPlayers.size + 1;
  document.getElementById('player-count').textContent = count;
}

// ===== ИГРОВОЙ ЦИКЛ =====
function animate() {
  requestAnimationFrame(animate);
  
  if (!scene || !camera || !renderer) return;
  
  sendMovement();
  updateCamera();
  
  renderer.render(scene, camera);
}

// ===== РЕСАЙЗ ОКНА =====
window.addEventListener('resize', () => {
  if (camera && renderer) {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }
});

console.log('[INFO] Roblox 3D Lite initialized');
</script>

</body>
</html>
